<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Estudiante — CTTG</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Outfit',sans-serif;background:#0f0f1a;color:#e2e8f0;min-height:100vh}
  header{background:linear-gradient(135deg,#1a0533,#2d1b69);border-bottom:1px solid rgba(255,255,255,.08);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
  .hdr-l h1{font-family:'DM Serif Display',serif;font-size:17px;color:#fff}
  .logo{width:38px;height:38px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px}
  .user-chip{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:5px 13px;font-size:12px}
  main{padding:24px 28px;max-width:900px;margin:0 auto}
  .form-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:24px;margin-bottom:18px}
  .fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
  .sec-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.35);font-weight:600;padding:10px 0 6px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:10px}
  label{font-size:11px;text-transform:uppercase;color:rgba(255,255,255,.45)}
  input,select,textarea{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:9px;color:#fff;padding:10px 13px;outline:none}
  .btn-rad{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:12px 28px;border-radius:10px;font-weight:600;cursor:pointer}
</style>
</head>
<body>
<header>
  <div class="hdr-l"><div class="logo">🎓</div><h1>CTTG Medicina</h1></div>
  <div class="user-chip" id="userChip">—</div>
</header>
<main>
  <div class="form-card">
    <div class="sec-label">📄 Proyecto</div>
    <div class="fg"><label>Título del proyecto *</label><input id="titulo"></div>
    <div class="fg"><label>Modalidad *</label>
      <select id="modalidad">
        <option value="">Seleccionar...</option>
        <option>Trabajo de investigación</option>
        <option>Monografia</option>
      </select>
    </div>

    <div class="sec-label">👨‍🏫 Tutor 1 (Opcional)</div>
    <div class="fg"><label>Nombre</label><input id="tutor1Nombre"></div>
    <div class="fg"><label>Email</label><input type="email" id="tutor1Email"></div>
    <div class="fg"><label>¿Vínculo contractual USC?</label>
      <select id="tutor1Relacion">
        <option value="No">No</option>
        <option value="Si">Si</option>
      </select>
    </div>

    <div class="sec-label">👨‍🏫 Tutor 2 (Opcional)</div>
    <div class="fg"><label>Nombre</label><input id="tutor2Nombre"></div>
    <div class="fg"><label>Email</label><input type="email" id="tutor2Email"></div>
    <div class="fg"><label>¿Vínculo contractual USC?</label>
      <select id="tutor2Relacion">
        <option value="No">No</option>
        <option value="Si">Si</option>
      </select>
    </div>

    <button class="btn-rad" id="btnRad" onclick="radicar()">📋 Radicar proyecto</button>
  </div>
</main>

<script>
const URL_APP = "https://script.google.com/macros/s/AKfycbxThWOEZZWmJTZ9SsAdEOE7a2e0ai9uddlZBGTUz7rt-iq2VepCf0YC8r4trjAiF7MhlA/exec";
let user = JSON.parse(localStorage.getItem('cttg_user') || '{}');
document.getElementById('userChip').textContent = user.nombre || user.email;

async function radicar() {
  if (!document.getElementById('titulo').value.trim()) return alert('Título requerido');
  if (!document.getElementById('modalidad').value) return alert('Modalidad requerida');

  const datos = {
    titulo: document.getElementById('titulo').value,
    modalidad: document.getElementById('modalidad').value,
    tutor1Nombre: document.getElementById('tutor1Nombre').value,
    tutor1Email: document.getElementById('tutor1Email').value,
    tutor1Relacion: document.getElementById('tutor1Relacion').value,
    tutor2Nombre: document.getElementById('tutor2Nombre').value,
    tutor2Email: document.getElementById('tutor2Email').value,
    tutor2Relacion: document.getElementById('tutor2Relacion').value
  };

  const btn = document.getElementById('btnRad');
  btn.disabled = true; btn.innerHTML = 'Radicando...';
  try {
    const res = await fetch(URL_APP, { method: 'POST', body: JSON.stringify({ action: 'createRadicacion', datos, emailEstudiante: user.email }) });
    const d = await res.json();
    if (d.success) { alert('Éxito: ' + d.numero); location.reload(); }
  } catch(e) { alert('Error de conexión'); }
  finally { btn.disabled = false; btn.innerHTML = '📋 Radicar proyecto'; }
}
</script>
</body>
</html>
