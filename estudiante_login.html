<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTTG Medicina - Login Estudiante</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
        }

        .login-box {
            background: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .login-box h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .login-box p {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .alert.error {
            background: #fee2e2;
            color: #7f1d1d;
            border: 1px solid #fca5a5;
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h1>🎓 CTTG Medicina</h1>
            <p>Ingresa como Estudiante</p>

            <div id="alert" class="alert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="tu@correo.usc.edu.co" required>
                </div>

                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" placeholder="Tu contraseña" required>
                </div>

                <button type="submit" class="btn" id="btnLogin">
                    <span id="textBtn">Ingresar</span>
                    <div id="loading" class="loading">
                        <div class="spinner"></div>
                        <p>Verificando...</p>
                    </div>
                </button>
            </form>

            <div class="back-link">
                <a href="index.html">← Volver al inicio</a>
            </div>
        </div>
    </div>

    <script>
        const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxPkshyhXbW8gDduKMAdsM5VHm2wF3OOjiDz6zesc_XdHIBa4FcQJxABr1UwSxxRLWZ/exec";

        document.getElementById("loginForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            document.getElementById("textBtn").style.display = "none";
            document.getElementById("loading").style.display = "block";
            document.getElementById("btnLogin").disabled = true;

            try {
                const response = await fetch(APP_SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "login",
                        email: email,
                        password: password
                    })
                });

                const data = await response.json();

                if (data.success && data.user.rol === "estudiante") {
                    // Guardar datos del usuario
                    localStorage.setItem("usuarioEstudiante", JSON.stringify({
                        email: data.user.email,
                        nombre: data.user.nombre,
                        rol: data.user.rol
                    }));

                    // Ir a radicación
                    window.location.href = "estudiante_radicacion.html";
                } else if (data.success && data.user.rol !== "estudiante") {
                    mostrarAlerta("Este usuario no es estudiante. Por favor usa tu cuenta de estudiante.");
                } else {
                    mostrarAlerta(data.error || "Email o contraseña incorrectos");
                }
            } catch (error) {
                mostrarAlerta("Error de conexión: " + error.message);
            } finally {
                document.getElementById("textBtn").style.display = "block";
                document.getElementById("loading").style.display = "none";
                document.getElementById("btnLogin").disabled = false;
            }
        });

        function mostrarAlerta(mensaje) {
            const alert = document.getElementById("alert");
            alert.textContent = mensaje;
            alert.className = "alert error";
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
